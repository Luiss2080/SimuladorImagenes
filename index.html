<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesador Canvas Premium</title>
    <!-- Importamos la fuente Outfit para un diseño moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <!-- Fondo animado dinámico -->
    <div class="background-animation"></div>
    <div class="orbe orbe-1"></div>
    <div class="orbe orbe-2"></div>

    <main class="contenedor-principal glassmorphism">
        <header class="header">
            <h1 class="titulo">Procesador Visual <span class="highlight">Pro</span></h1>
            <p class="subtitulo">Manipulación de píxeles en tiempo real con HTML5 Canvas</p>
        </header>
        
        <!-- Barra de herramientas superior -->
        <div class="controles-superiores">
            <button id="btnCargar" class="btn btn-primario pulse-anim">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Cargar Imagen
            </button>
            <input type="file" id="inputImagen" accept="image/*" class="oculto">
            
            <button id="btnDescargar" class="btn btn-secundario oculto">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Exportar HD
            </button>
        </div>

        <div class="area-workspace">
            <!-- Contenedor del Canvas -->
            <div class="area-canvas">
                <canvas id="lienzo"></canvas>
                <div id="mensajeVacio" class="mensaje-vacio">
                    <svg class="icono-flotante" xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <span>Sube una imagen para desatar la magia</span>
                </div>
            </div>

            <!-- Panel Lateral de Herramientas (Oculto hasta subir imagen) -->
            <aside class="panel-herramientas oculto" id="panelHerramientas">
                <div class="grupo-herramientas">
                    <h3>Efectos Creativos</h3>
                    <div class="grid-filtros">
                        <button id="btnSepia" class="btn btn-filtro">Sepia</button>
                        <button id="btnInvertir" class="btn btn-filtro">Invertir</button>
                        <button id="btnBinario" class="btn btn-filtro">Binario</button>
                        <button id="btnEscalaGrises" class="btn btn-filtro">Grises</button>
                        <button id="btnRuido" class="btn btn-filtro">Ruido</button>
                        <button id="btnFiltroAzul" class="btn btn-filtro">Tono Azul</button>
                    </div>
                </div>

                <div class="grupo-herramientas">
                    <h3>Ajustes Manuales</h3>
                    <div class="control-rango">
                        <label for="rangoBrillo">Brillo <span id="valBrillo">100%</span></label>
                        <input type="range" id="rangoBrillo" min="0" max="200" value="100">
                    </div>
                    <div class="control-rango">
                        <label for="rangoContraste">Contraste <span id="valContraste">100%</span></label>
                        <input type="range" id="rangoContraste" min="0" max="200" value="100">
                    </div>
                </div>

                <div class="grupo-herramientas mt-auto">
                    <button id="btnResetear" class="btn btn-reset">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                        Restaurar Original
                    </button>
                </div>
            </aside>
        </div>
    </main>
    <script src="./index.js"></script>
</body>
</html>
